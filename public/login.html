<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Lunas de Octubre</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#0f0c29,#302b63,#24243e);
    color:white;
}

.login-box{
    background: rgba(255,255,255,0.05);
    padding:40px;
    border-radius:20px;
    width:320px;
    backdrop-filter: blur(12px);
    box-shadow:0 15px 40px rgba(0,0,0,0.4);
    text-align:center;
}

h2{
    margin-bottom:20px;
    color:#ffd700;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:12px;
    border:none;
    background: rgba(255,255,255,0.1);
    color:white;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background: linear-gradient(135deg,#f7971e,#ffd200);
    font-weight:bold;
    cursor:pointer;
}

.error{
    color:#ff4b2b;
    margin-top:10px;
    font-weight:bold;
}

.logo{
    font-size:22px;
    margin-bottom:10px;
}
</style>

</head>

<body>

<div class="login-box">

<div class="logo">🌙 Lunas de Octubre</div>
<h2>🔐 Panel Admin</h2>

<input id="usuario" placeholder="Usuario">
<input id="password" type="password" placeholder="Contraseña">

<button onclick="login()">Ingresar</button>

<div class="error" id="error"></div>

</div>

<script>

function login(){

    const user = document.getElementById("usuario").value;
    const pass = document.getElementById("password").value;

    if(user === "Yuris" && pass === "lunas1326"){
        localStorage.setItem("login","ok"); // 🔥 CLAVE
        window.location.href = "admin.html";
    }else{
        document.getElementById("error").innerText = "❌ Usuario o contraseña incorrectos";
    }
}

</script>

</body>
</html>

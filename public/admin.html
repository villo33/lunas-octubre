<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Lunas de Octubre</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f0c29,#302b63,#24243e);
    color:white;
}

/* HEADER */
header{
    background: linear-gradient(135deg,#1f1c2c,#928dab);
    padding:25px;
    text-align:center;
    font-size:26px;
}

/* LOGOUT */
.logout-btn{
    padding:10px 20px;
    background: linear-gradient(135deg,#ff416c,#ff4b2b);
    border:none;
    border-radius:12px;
    cursor:pointer;
    display:block;
    margin:15px auto;
}

/* FORM */
.container{
    max-width:500px;
    margin:20px auto;
    background: rgba(255,255,255,0.05);
    padding:25px;
    border-radius:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:12px;
    border:none;
    background: rgba(255,255,255,0.1);
    color:white;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background: linear-gradient(135deg,#ffd200,#f7971e);
    cursor:pointer;
    font-weight:bold;
}

/* LISTA */
.lista{
    max-width:1000px;
    margin:30px auto;
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background: rgba(255,255,255,0.05);
    padding:15px;
    border-radius:15px;
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:10px;
}

.actions{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.edit{background:#007bff;color:white;}
.delete{background:#ff4b2b;color:white;}

.mensaje{
    text-align:center;
    margin-top:10px;
    color:#ffd200;
}
</style>
</head>

<body>

<header>🌙 Admin Lunas de Octubre</header>

<button onclick="logout()" class="logout-btn">Cerrar sesión</button>

<div class="container">
<h3>Agregar Producto</h3>

<input id="nombre" placeholder="Nombre">
<input id="precio" placeholder="Precio">
<input id="cantidad" placeholder="Cantidad">

<input type="file" id="imagen">
<img id="preview">

<button onclick="guardar()">Guardar</button>
<div id="msg" class="mensaje"></div>
</div>

<h3 style="text-align:center;">📦 Productos</h3>
<div id="lista" class="lista"></div>

<script>

/* LOGIN */
if(localStorage.getItem("Yuris") !== "lunas1326"){
    window.location.href="login.html";
}

function logout(){
    localStorage.removeItem("Yuris");
    window.location.href="login.html";
}

/* PREVIEW */
imagen.onchange = ()=>{
    const file = imagen.files[0];
    const reader = new FileReader();

    reader.onload = e=>{
        preview.src = e.target.result;
        preview.style.display="block";
    }

    reader.readAsDataURL(file);
}

/* 🔥 GUARDAR (NUEVO BACKEND) */
function guardar(){
    const formData = new FormData();

    formData.append("nombre", nombre.value);
    formData.append("precio", precio.value);
    formData.append("cantidad", cantidad.value);
    formData.append("imagen", imagen.files[0]);

    fetch("https://lunas-octubre.onrender.com/api/productos",{
        method:"POST",
        body:formData
    })
    .then(()=> {
        msg.innerText="✅ Producto guardado";

        nombre.value="";
        precio.value="";
        cantidad.value="";
        imagen.value="";
        preview.style.display="none";

        cargarProductos();
    });
}

/* 🔥 CARGAR PRODUCTOS */
function cargarProductos(){

fetch("https://lunas-octubre.onrender.com/api/productos")
.then(res=>res.json())
.then(data=>{

    const contenedor = document.getElementById("lista");
    contenedor.innerHTML = "";

    data.forEach(p => {

        contenedor.innerHTML += `
        <div class="card">
            <img src="${p.imagen}">
            <h4>${p.nombre}</h4>
            <p>$${p.precio}</p>
            <p>Stock: ${p.cantidad}</p>

            <div class="actions">
                <button class="edit" onclick="editar(${p.id})">Editar</button>
                <button class="delete" onclick="eliminar(${p.id})">Eliminar</button>
            </div>
        </div>
        `;
    });

});
}

/* 🔥 ELIMINAR */
function eliminar(id){
    if(confirm("¿Eliminar producto?")){
        fetch(`https://lunas-octubre.onrender.com/api/productos/${id}`,{
            method:"DELETE"
        })
        .then(()=>cargarProductos());
    }
}

/* 🔥 EDITAR */
function editar(id){
    const nombreNuevo = prompt("Nombre:");
    const precioNuevo = prompt("Precio:");
    const cantidadNueva = prompt("Cantidad:");

    fetch(`https://lunas-octubre.onrender.com/api/productos/${id}`,{
        method:"PUT",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            nombre:nombreNuevo,
            precio:precioNuevo,
            cantidad:cantidadNueva
        })
    })
    .then(()=>cargarProductos());
}

/* INICIAR */
cargarProductos();

</script>

</body>
</html>

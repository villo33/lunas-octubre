<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Lunas de Octubre</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f0c29,#302b63,#24243e);
    color:white;
}

/* HEADER */
header{
    background: linear-gradient(135deg,#1f1c2c,#928dab);
    padding:22px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
    letter-spacing:1px;
}

/* LOGOUT (MEJORADO) */
.logout-btn{
    padding:8px 16px;
    background: linear-gradient(135deg,#ff416c,#ff4b2b);
    border:none;
    border-radius:10px;
    cursor:pointer;
    display:block;
    margin:12px auto;
    font-size:13px;
    font-weight:bold;
    width:160px;
    transition:0.3s;
}

.logout-btn:hover{
    transform:scale(1.05);
    opacity:0.9;
}

/* FORM */
.container{
    max-width:520px;
    margin:20px auto;
    background: rgba(255,255,255,0.05);
    padding:22px;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

input{
    width:100%;
    padding:11px;
    margin:8px 0;
    border-radius:10px;
    border:none;
    background: rgba(255,255,255,0.1);
    color:white;
    outline:none;
}

button{
    width:100%;
    padding:11px;
    border:none;
    border-radius:10px;
    background: linear-gradient(135deg,#ffd200,#f7971e);
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    transform:scale(1.02);
}

/* LISTA */
.lista{
    max-width:1100px;
    margin:30px auto;
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(230px,1fr));
    gap:18px;
    padding:0 15px;
}

/* CARD MEJORADA */
.card{
    background: rgba(255,255,255,0.06);
    padding:14px;
    border-radius:15px;
    box-shadow:0 8px 18px rgba(0,0,0,0.3);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

/* IMAGEN BALANCEADA (CLAVE) */
.card img{
    width:100%;
    height:170px;
    object-fit:cover;
    border-radius:12px;
    margin-bottom:10px;
}

/* TEXTO */
.card h4{
    margin:5px 0;
    font-size:16px;
}

.card p{
    margin:3px 0;
    font-size:14px;
    opacity:0.9;
}

/* BOTONES */
.actions{
    display:flex;
    gap:8px;
    margin-top:10px;
}

.actions button{
    flex:1;
    padding:8px;
    font-size:13px;
    border-radius:8px;
}

.edit{background:#007bff;color:white;}
.delete{background:#ff4b2b;color:white;}

.mensaje{
    text-align:center;
    margin-top:10px;
    color:#ffd200;
}
</style>
</head>

<body>

<header>🌙 Admin Lunas de Octubre</header>

<button onclick="logout()" class="logout-btn">Cerrar sesión</button>

<div class="container">
<h3>Agregar Producto</h3>

<input id="nombre" placeholder="Nombre">
<input id="precio" placeholder="Precio">
<input id="cantidad" placeholder="Cantidad">

<input type="file" id="imagen">
<img id="preview" style="width:100%;margin-top:10px;border-radius:10px;display:none;">

<button onclick="guardar()">Guardar</button>
<div id="msg" class="mensaje"></div>
</div>

<h3 style="text-align:center;">📦 Productos</h3>
<div id="lista" class="lista"></div>

<script>

/* LOGIN */
if(!localStorage.getItem("login")){
    window.location.href="login.html";
}

function logout(){
    localStorage.removeItem("login");
    window.location.href="login.html";
}

/* PREVIEW */
imagen.onchange = ()=>{
    const file = imagen.files[0];
    const reader = new FileReader();

    reader.onload = e=>{
        preview.src = e.target.result;
        preview.style.display="block";
    }

    reader.readAsDataURL(file);
}

/* GUARDAR */
function guardar(){

    if(!nombre.value || !precio.value || !cantidad.value){
        msg.innerText = "❌ Completa todos los campos";
        return;
    }

    if(!imagen.files[0]){
        msg.innerText = "❌ Selecciona una imagen";
        return;
    }

    const formData = new FormData();

    formData.append("nombre", nombre.value);
    formData.append("precio", precio.value);
    formData.append("cantidad", cantidad.value);
    formData.append("imagen", imagen.files[0]);

    fetch("https://lunas-octubre.onrender.com/api/productos",{
        method:"POST",
        body:formData
    })
    .then(res => res.json())
    .then(data => {

        if(data.error){
            msg.innerText = "❌ " + data.error;
            return;
        }

        msg.innerText="✅ Producto guardado";

        nombre.value="";
        precio.value="";
        cantidad.value="";
        imagen.value="";
        preview.style.display="none";

        cargarProductos();
    })
    .catch(()=>{
        msg.innerText="❌ Error al guardar";
    });
}

/* CARGAR */
function cargarProductos(){

fetch("https://lunas-octubre.onrender.com/api/productos")
.then(res=>res.json())
.then(data=>{

    const contenedor = document.getElementById("lista");
    contenedor.innerHTML = "";

    data.forEach(p => {

        contenedor.innerHTML += `
        <div class="card">
            <img src="${p.imagen}">
            <h4>${p.nombre}</h4>
            <p>💰 $${p.precio}</p>
            <p>📦 Stock: ${p.cantidad}</p>

            <div class="actions">
                <button class="edit" onclick="editar(${p.id})">Editar</button>
                <button class="delete" onclick="eliminar(${p.id})">Eliminar</button>
            </div>
        </div>
        `;
    });

});
}

/* ELIMINAR */
function eliminar(id){
    if(confirm("¿Eliminar producto?")){
        fetch(`https://lunas-octubre.onrender.com/api/productos/${id}`,{
            method:"DELETE"
        })
        .then(()=>cargarProductos());
    }
}

/* EDITAR */
function editar(id){
    const nombreNuevo = prompt("Nombre:");
    const precioNuevo = prompt("Precio:");
    const cantidadNueva = prompt("Cantidad:");

    fetch(`https://lunas-octubre.onrender.com/api/productos/${id}`,{
        method:"PUT",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            nombre:nombreNuevo,
            precio:precioNuevo,
            cantidad:cantidadNueva
        })
    })
    .then(()=>cargarProductos());
}

/* INICIO */
cargarProductos();

</script>

</body>
</html>
